<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="./index.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=sync_alt" />
</head>
<body>
    <div class="container">
         <h1>Currency Converter</h1>
         <div class="container_child">

           <div class="input_box">
             <label for="amount_input">Enter Amout</label>
             <input id="amount_input" type="number">
  
           </div>
           <div class="collective_select">
             <!-- left flag box -->
              <div class="left_select_box_container">
                <label for="left_select">From</label>
                 <div class="left_select_box">
                     <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Flag_of_India.png/1280px-Flag_of_India.png" width="20px" height="20px" alt="">
                     <select name="" id="left_select">
                        
                     </select>
                 </div>
              </div>
    
              <span class="arrow_icon material-symbols-outlined">
                sync_alt
             </span>
              <div class="right_select_box_container">
                  <!-- right flag box -->
                  <label for="right_select_box">To</label>
                  <div class="right_select_box">
                    <img src="https://upload.wikimedia.org/wikipedia/en/archive/a/a4/20151118161037%21Flag_of_the_United_States.svg" width="20px" height="20px" alt="">
                    <select name="" id="right_select">
                     
                    </select>
                </div>
              </div>
           </div>
  
            <!-- output -->
             <p>500 TRY = 388.93 HNL</p>
             <button>Get Exchange Rate</button>
         </div>
    </div>
    
    <script type="module" src="./first.js"></script>
</body>
</html>
