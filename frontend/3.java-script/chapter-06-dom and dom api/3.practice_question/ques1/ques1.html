<!-- Qs.Create a H2 heading element with text - “Hello JavaScript”. Append “from technoglobe students” to this text using JS. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h2 id="heading">Hello JavaScript</h2>
  <script>
    let heading = document.getElementById("heading");
    heading.textContent=heading.textContent+ " from technoglobe students";
  </script>
</body>
</html>
