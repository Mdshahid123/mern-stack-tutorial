<!-- handling mouse events using inline events handler -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inline events</title>
</head>
<body>
       <!-- onllick events -->
       <button onclick="alert('Button clicked!')">click me</button>
       <!-- on double event's -->
       <button ondblclick="alert('Button double clicked!')">double click me</button>
       <!-- on mouse down -->
       <button onmousedown="alert('Mouse button pressed!')">Mouse Down</button>
       <!-- on mouse up -->
       <button onmouseup="alert('Mouse button released!')">Mouse Up</button>
       <!-- on mouse over -->
       <button onmouseover="alert('Mouse is over the button!')">Mouse Over</button>
       <!-- on mouse out -->
       <button onmouseout="alert('Mouse is out of the button!')">Mouse Out</button>
        <!-- on mouse move -->
        <button onmousemove="console.log('Mouse is moving over the button!')">Move Mouse Here</button>
        
</body>
</html>
