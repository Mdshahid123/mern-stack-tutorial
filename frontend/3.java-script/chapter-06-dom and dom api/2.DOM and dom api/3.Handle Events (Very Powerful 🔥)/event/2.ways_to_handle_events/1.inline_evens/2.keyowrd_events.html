<!--handling keyboard events using inline events handler -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Events</title>
</head>
<body>
       <!-- onkeydown event -->
       <input type="text" onkeydown="alert('Key pressed down!')">
       <!-- onkeyup event -->
       <input type="text" onkeyup="alert('Key released!')">
       <!-- onkeypress event -->
       <input type="text" onkeypress="alert('Key pressed and released!')">
</body>
</html>
