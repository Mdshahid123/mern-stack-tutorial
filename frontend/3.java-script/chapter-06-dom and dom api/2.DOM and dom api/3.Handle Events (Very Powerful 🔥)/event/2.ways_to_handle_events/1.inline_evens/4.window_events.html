<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>window events</title>
</head>
<body>
        <!-- onload event -->
        <body onload="alert('Page loaded!')">
        <!-- onunload event -->
        <body onunload="alert('Page unloaded!')">
        <!-- onresize event -->
        <body onresize="alert('Window resized!')">
        <!-- onscroll event -->
        <body onscroll="alert('Window scrolled!')"> 
</body>
</html>
