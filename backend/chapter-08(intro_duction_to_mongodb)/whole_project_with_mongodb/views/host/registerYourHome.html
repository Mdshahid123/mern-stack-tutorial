<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Become a Host</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI';
}

body{
  background:#f7f7f7;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:40px auto;
  background:white;
  border-radius:18px;
  overflow:hidden;
  border:1px solid #eee;
}

/* HEADER */
.header{
  padding:25px 30px;
  border-bottom:1px solid #eee;
}

.header h2{
  font-size:28px;
  color:#222;
}

/* PROGRESS */
.progress{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  border-bottom:1px solid #eee;
}

.progress span{
  font-size:14px;
  color:#999;
}

.progress .active{
  color:#ff385c;
  font-weight:600;
}

/* FORM */
.form{
  padding:30px;
}

.step{
  display:none;
}

.step.active{
  display:block;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:15px;
  font-size:14px;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#ff385c;
}

/* TEXTAREA */
.textarea{
  width:100%;
  min-height:120px;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:15px;
  resize:none;
  outline:none;
  font-size:14px;
}

.textarea:focus{
  border-color:#ff385c;
}

/* ROW */
.row{
  display:flex;
  gap:15px;
}

.row input{
  flex:1;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:space-between;
  margin-top:25px;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

.next{
  background:#ff385c;
  color:white;
}

.prev{
  background:#eee;
}

/* IMAGE PREVIEW */
.preview{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:16px;
  margin-top:10px;
  border:1px solid #eee;
  display:none;
}

.image-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:15px;
}

.small-preview{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid #eee;
  display:none;
}

/* AMENITIES */
.amenities{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.amenities label{
  cursor:pointer;
}

.amenities input{
  display:none;
}

.amenities span{
  border:1px solid #ddd;
  padding:10px 16px;
  border-radius:30px;
  display:inline-block;
  transition:.2s;
}

.amenities input:checked + span{
  background:#ff385c;
  color:white;
  border-color:#ff385c;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Become a Host</h2>
  </div>

  <!-- PROGRESS -->
  <div class="progress">
    <span class="active">Details</span>
    <span>Location</span>
    <span>Images</span>
    <span>Amenities</span>
    <span>Host</span>
  </div>

  <!-- FORM -->
  <div class="form">

    <!-- STEP 1 -->
    <div class="step active">

      <input required id="homeName" placeholder="Home Name" >

      <div class="row">
        <input id="price" type="number" placeholder="Price Per Night" required>
        <input id="rating" type="number" placeholder="Rating" >
      </div>

      <!-- DESCRIPTION -->
      <textarea required
        id="description"
        placeholder="Describe your property..."
        class="textarea"
      ></textarea>

      <!-- REVIEWS -->
      <input 
        id="reviews"
        type="number"
        placeholder="Number of Reviews"
      >

      <div class="buttons">
        <span></span>
        <button type="button" class="next">Next</button>
      </div>

    </div>

    <!-- STEP 2 -->
    <div class="step">

      <input id="location" placeholder="Enter Location" required>

      <div class="buttons">
        <button type="button" class="prev">Back</button>
        <button type="button" class="next">Next</button>
      </div>

    </div>

    <!-- STEP 3 -->
    <div class="step">

      <h3 style="margin-bottom:15px;">Add Home Images</h3>

      <!-- MAIN IMAGE -->
      <label style="font-size:14px;color:#555;" >
        Main Home Image URL 
      </label>

      <input required
        type="text"
        id="mainImage"
        placeholder="https://example.com/home.jpg"
      >

      <img id="mainPreview" class="preview">

      <!-- OTHER IMAGES -->
      <label style="margin-top:20px;display:block;font-size:14px;color:#555;">
        Other Home Images
      </label>

      <input required
        type="text"
        id="img1"
        placeholder="Bedroom Image URL"
      >

      <input
        required
        type="text"
        id="img2"
        placeholder="Living Room Image URL"
      >

      <input
      required
        type="text"
        id="img3"
        placeholder="Kitchen Image URL"
      >

      <!-- PREVIEW GRID -->
      <div class="image-grid">

        <img id="preview1" class="small-preview">
        <img id="preview2" class="small-preview">
        <img id="preview3" class="small-preview">

      </div>

      <div class="buttons">
        <button type="button" class="prev">Back</button>
        <button type="button" class="next">Next</button>
      </div>

    </div>

    <!-- STEP 4 -->
    <div class="step">

      <h3 style="margin-bottom:15px;">Amenities</h3>

      <div class="amenities">

        <label>
          <input type="checkbox" value="WiFi">
          <span>WiFi</span>
        </label>

        <label>
          <input type="checkbox" value="AC">
          <span>AC</span>
        </label>

        <label>
          <input type="checkbox" value="Parking">
          <span>Parking</span>
        </label>

        <label>
          <input type="checkbox" value="TV">
          <span>TV</span>
        </label>

        <label>
          <input type="checkbox" value="Pool">
          <span>Pool</span>
        </label>

      </div>

      <div class="buttons">
        <button type="button" class="prev">Back</button>
        <button type="button" class="next">Next</button>
      </div>

    </div>

    <!-- STEP 5 -->
    <div class="step">

      <input id="hostName" placeholder="Host Name" required>

      <input id="joined" placeholder="Joined Year" required>

      <div class="buttons">
        <button type="button" class="prev">Back</button>
        <button type="button" id="submit">Submit</button>
      </div>

    </div>

  </div>

</div>

<script>

  const steps = document.querySelectorAll(".step");
const progress = document.querySelectorAll(".progress span");

let current = 0;

/* SHOW STEP */
function showStep(index){

  steps.forEach(step=>{
    step.classList.remove("active");
  });

  progress.forEach(item=>{
    item.classList.remove("active");
  });

  steps[index].classList.add("active");
  progress[index].classList.add("active");
}

/* NEXT BUTTON */
const nextBtns = document.querySelectorAll(".next");

nextBtns.forEach(nextBtn=>{

  nextBtn.addEventListener("click",()=>{

    const currentStep = steps[current];

    /* REQUIRED FIELDS */
    const requiredFields =
      currentStep.querySelectorAll("[required]");

    let isValid = true;

    requiredFields.forEach(field=>{

      if(!field.value.trim()){

        field.style.borderColor = "red";

        isValid = false;

      }else{

        field.style.borderColor = "#ddd";

      }

    });

    /* STEP 4 = AMENITIES VALIDATION */
    if(current === 3){

      const checkedAmenities =
        document.querySelectorAll(
          ".amenities input:checked"
        );

      if(checkedAmenities.length === 0){

        alert("Select at least one amenity");

        isValid = false;
      }
    }

    /* STOP IF INVALID */
    if(!isValid) return;

    /* MOVE NEXT */
    if(current < steps.length - 1){

      current++;

      showStep(current);

    }

  });

});

/* PREVIOUS BUTTON */
const prevBtns = document.querySelectorAll(".prev");

prevBtns.forEach(btn=>{

  btn.addEventListener("click",()=>{

    if(current > 0){

      current--;

      showStep(current);

    }

  });

});



/* INIT */
showStep(0);

</script>

</body>
</html>
