<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb - Add Home</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      background:#f7f7f7;
    }

    /* Navbar */
    nav{
      background:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }

    nav h2{
      color:#ff385c;
    }

    nav ul{
      display:flex;
      gap:25px;
      list-style:none;
    }

    nav a{
      text-decoration:none;
      color:#333;
      font-weight:500;
    }

    nav a:hover{
      color:#ff385c;
    }

    /* Container */
    .container{
      max-width:500px;
      margin:60px auto;
      background:white;
      padding:30px;
      border-radius:16px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:24px;
    }

    .form{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input{
      padding:12px;
      border-radius:8px;
      border:1px solid #ddd;
      outline:none;
      transition:0.2s;
      font-size:14px;
    }

    input:focus{
      border-color:#ff385c;
      box-shadow:0 0 0 2px rgba(255,56,92,0.2);
    }

    button{
      background:#ff385c;
      color:white;
      padding:12px;
      border:none;
      border-radius:10px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#e03150;
      transform:translateY(-1px);
    }

    /* Responsive */
    @media(max-width:600px){
      .container{
        margin:30px 15px;
      }
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h2>Airbnb</h2>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/host/add-home">Add Home</a></li>
    </ul>
  </nav>

  <!-- Form -->
  <div class="container">
    <h1>Register Your Home</h1>

    <form class="form" action="/submit" method="POST">
      <input type="text" placeholder="House Name" name="homeName" required>
      <input type="number" placeholder="Price per Night (₹)" name="pricePerNight" required>
      <input type="text" placeholder="Location" name="Location" required>
      <input type="number" step="0.1" placeholder="Rating (e.g. 4.5)" name="rating">
      <input type="url" placeholder="Photo URL" name="photourl" required>

      <button type="submit">Add Home</button>
    </form>
  </div>

</body>
</html>
