<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Become a Host</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{background:#fff;}

.container{
  max-width:850px;
  margin:40px auto;
  border:1px solid #eee;
  border-radius:16px;
}

.header{padding:25px;border-bottom:1px solid #eee;}

.progress{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  border-bottom:1px solid #eee;
}

.progress span{color:#aaa;font-size:13px;}
.progress .active{color:#ff385c;font-weight:600;}

.form{padding:30px;}
.step{display:none;}
.step.active{display:block;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

.buttons{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

button{
  padding:10px 18px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.next{background:#ff385c;color:white;}
.prev{background:#eee;}

#map{
  height:250px;
  border-radius:10px;
  margin-top:10px;
}

.preview{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

/* Amenities */
.amenities{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.amenities label{
  border:1px solid #ddd;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.amenities input{
  display:none;
}

.amenities input:checked + span{
  background:#ff385c;
  color:white;
  border-radius:20px;
  padding:8px 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>Become a Host</h2>
</div>

<div class="progress">
  <span class="active">Details</span>
  <span>Location</span>
  <span>Amenities</span>
  <span>Host</span>
</div>

<div class="form">

<!-- STEP 1 -->
<div class="step active">
  <input id="homeName" placeholder="Home Name">
  <input id="price" type="number" placeholder="Price">
  <input id="rating" type="number" placeholder="Rating">
  <button class="next">Next</button>
</div>

<!-- STEP 2 -->
<div class="step">
  <input id="location" placeholder="Auto filled location">
  
  <input id="photo" type="file" accept="image/*">
  <img id="preview" class="preview">

  <div id="map"></div>

  <div class="buttons">
    <button class="prev">Back</button>
    <button class="next">Next</button>
  </div>
</div>

<!-- STEP 3 -->
<div class="step">

  <div class="amenities">
    <label><input type="checkbox" value="WiFi"><span>WiFi</span></label>
    <label><input type="checkbox" value="AC"><span>AC</span></label>
    <label><input type="checkbox" value="Parking"><span>Parking</span></label>
    <label><input type="checkbox" value="TV"><span>TV</span></label>
  </div>

  <div class="buttons">
    <button class="prev">Back</button>
    <button class="next">Next</button>
  </div>
</div>

<!-- STEP 4 -->
<div class="step">
  <input id="hostName" placeholder="Host Name">
  <input id="joined" placeholder="Joined Year">

  <div class="buttons">
    <button class="prev">Back</button>
    <button id="submit">Submit</button>
  </div>
</div>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const steps = document.querySelectorAll(".step");
const progress = document.querySelectorAll(".progress span");
let current = 0;

/* INPUTS */
const homeName = document.getElementById("homeName");
const price = document.getElementById("price");
const rating = document.getElementById("rating");
const locationInput = document.getElementById("location");
const photoInput = document.getElementById("photo");
const preview = document.getElementById("preview");
const hostName = document.getElementById("hostName");
const joined = document.getElementById("joined");

/* STEP SWITCH */
function showStep(i){
  steps.forEach(s=>s.classList.remove("active"));
  steps[i].classList.add("active");

  progress.forEach(p=>p.classList.remove("active"));
  progress[i].classList.add("active");

  current = i;

  if(i===1) initMap();
}

/* NAV */
document.querySelectorAll(".next").forEach(btn=>{
  btn.onclick=()=>showStep(current+1);
});

document.querySelectorAll(".prev").forEach(btn=>{
  btn.onclick=()=>showStep(current-1);
});

/* IMAGE PREVIEW */
photoInput.addEventListener("change",()=>{
  const file = photoInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

/* MAP + AUTO ADDRESS */
let map, marker;

function initMap(){
  if(map) return;

  map = L.map('map').setView([28.6139,77.2090],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on('click', async function(e){

    if(marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    /* REVERSE GEOCODING */
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const data = await res.json();

    locationInput.value = data.display_name || `${lat}, ${lon}`;
  });
}

/* SUBMIT */
document.getElementById("submit").onclick = async ()=>{

  const amenities = [];
  document.querySelectorAll(".amenities input:checked").forEach(a=>{
    amenities.push(a.value);
  });

  const formData = new FormData();
  formData.append("homeName", homeName.value);
  formData.append("price", price.value);
  formData.append("rating", rating.value);
  formData.append("location", locationInput.value);
  formData.append("photo", photoInput.files[0]);
  formData.append("amenities", JSON.stringify(amenities));
  formData.append("hostName", hostName.value);
  formData.append("joined", joined.value);

  const res = await fetch("/host/submit",{
    method:"POST",
    body:formData
  });

  const data = await res.json();

  alert(data.message || "Submitted!");
};

showStep(0);

</script>

</body>
</html>
